name: Test Pipeline

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  checks: write

jobs:
  contract:
    name: contract_check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            MetaRec-backend/requirements.txt
            MetaRec-backend/requirements-dev.txt

      - name: Install backend dependencies
        working-directory: MetaRec-backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Export OpenAPI contract
        run: python MetaRec-backend/scripts/export_openapi.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: MetaRec-ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: MetaRec-ui
        run: npm ci

      - name: Generate frontend contract types
        working-directory: MetaRec-ui
        run: npm run contract:gen

      - name: Validate OpenAPI contract (semantic)
        run: npx --yes @redocly/cli bundle contracts/metarec-openapi.json -o /tmp/metarec-openapi.bundle.json

      - name: Validate generated contract types compile
        working-directory: MetaRec-ui
        run: npx tsc --noEmit

      - name: Upload contract artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-artifacts
          path: |
            contracts/metarec-openapi.json
            MetaRec-ui/src/contracts/openapi-types.ts
          if-no-files-found: error
          retention-days: 14

  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: contract
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend_unit
            stack: frontend
            workdir: MetaRec-ui
            command: npx vitest run src/__tests__/api.unit.test.ts --reporter=default --reporter=junit --outputFile.junit=reports/frontend-unit.junit.xml
            report: reports/frontend-unit.junit.xml
          - name: frontend_render
            stack: frontend
            workdir: MetaRec-ui
            command: npx vitest run src/__tests__/*.test.tsx --reporter=default --reporter=junit --outputFile.junit=reports/frontend-render.junit.xml
            report: reports/frontend-render.junit.xml
          - name: backend_unit
            stack: backend
            workdir: MetaRec-backend
            command: python -m pytest -q -m backend_unit --junitxml=reports/backend-unit.junit.xml
            report: reports/backend-unit.junit.xml
          - name: backend_chain_standard
            stack: backend
            workdir: MetaRec-backend
            command: python -m pytest -q -m chain_standard --junitxml=reports/backend-chain-standard.junit.xml
            report: reports/backend-chain-standard.junit.xml
          - name: backend_chain_retrial
            stack: backend
            workdir: MetaRec-backend
            command: python -m pytest -q -m chain_retrial --junitxml=reports/backend-chain-retrial.junit.xml
            report: reports/backend-chain-retrial.junit.xml
          - name: backend_chain_fallback
            stack: backend
            workdir: MetaRec-backend
            command: python -m pytest -q -m chain_fallback --junitxml=reports/backend-chain-fallback.junit.xml
            report: reports/backend-chain-fallback.junit.xml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: matrix.stack == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: MetaRec-ui/package-lock.json

      - name: Install frontend dependencies
        if: matrix.stack == 'frontend'
        working-directory: MetaRec-ui
        run: npm ci

      - name: Set up Python
        if: matrix.stack == 'backend'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            MetaRec-backend/requirements.txt
            MetaRec-backend/requirements-dev.txt

      - name: Install backend dependencies
        if: matrix.stack == 'backend'
        working-directory: MetaRec-backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        working-directory: ${{ matrix.workdir }}
        run: |
          mkdir -p reports
          ${{ matrix.command }}

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-junit
          path: ${{ matrix.workdir }}/${{ matrix.report }}
          if-no-files-found: warn
          retention-days: 14

  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          path: test-reports
          pattern: "*-junit"
          merge-multiple: true

      - name: Publish PR test summary
        continue-on-error: true
        uses: dorny/test-reporter@v1
        with:
          name: junit-summary
          path: test-reports/*.xml
          reporter: java-junit
          fail-on-error: false
