[pytest]
testpaths = tests
addopts = -p no:cacheprovider --basetemp=__pytest_runtime__/tmp
asyncio_default_fixture_loop_scope = function
markers =
    backend_unit: backend unit tests
    chain_standard: backend chain test with LLM mock standard success mode
    chain_retrial: backend chain test with LLM mock retry mode
    chain_fallback: backend chain test with LLM mock fallback mode
